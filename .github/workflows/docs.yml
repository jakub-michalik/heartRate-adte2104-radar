name: Dokumentacja

on:
  push:
    branches: [main]
  workflow_dispatch:

# uprawnienia wymagane do publikacji na GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# pozwól tylko jednemu wdrożeniu naraz
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalacja zależności dokumentacji
        run: |
          python -m pip install --upgrade pip
          # pyserial jest potrzebny, bo autodoc importuje moduł aplikacji
          pip install pyserial
          pip install -r docs/requirements.txt

      - name: Build Sphinx (traktuj warningi jako błędy)
        run: sphinx-build -b html -W docs docs/_build/html

      - name: Upload artefaktu Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Wdrożenie na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
